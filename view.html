<script>
let p = new URLSearchParams(location.search).get("script")

let s = {
  blox: "loadstring(game:HttpGet('https://raw.githubusercontent.com/Teufkijdjd/ZeionVisual/refs/heads/main/Zeionhub'))()",
  aimbot: "loadstring(game:HttpGet('https://raw.githubusercontent.com/Teufkijdjd/Aimzeion/refs/heads/main/Aim'))()",
  boat: "loadstring(game:HttpGet('https://raw.githubusercontent.com/Teufkijdjd/Zeion/refs/heads/main/Zeion'))()"
}

/* debug กันพลาด */
if(!p || !s[p]){
  document.getElementById("title").innerText = "Script Not Found"
  document.getElementById("code").value = "Error: script not found"
}else{
  document.getElementById("title").innerText = p.toUpperCase()
  document.getElementById("code").value = s[p]
}
</script>
