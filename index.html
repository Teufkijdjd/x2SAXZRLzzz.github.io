<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dextezr Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  font-weight: 700;
  font-size: 22px;
  color: #00ffe1;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #aaa;
  transition: 0.3s;
}
nav a:hover {
  color: #00ffe1;
}

/* Hero */
.hero {
  text-align: center;
  margin-top: 100px;
}

.hero h1 {
  font-size: 48px;
  background: linear-gradient(90deg,#00ffe1,#0066ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  margin-top: 15px;
  color: #aaa;
}

/* Button */
.btn {
  margin-top: 30px;
  padding: 12px 30px;
  border: none;
  background: linear-gradient(90deg,#00ffe1,#0066ff);
  color: black;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffe1;
}

/* Features */
.features {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 100px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 30px;
  width: 250px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px #00ffe1;
}

.card h3 {
  margin-bottom: 10px;
  color: #00ffe1;
}

/* Footer */
footer {
  margin-top: 100px;
  text-align: center;
  padding: 20px;
  color: #555;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Dextezr X</div>
  <div>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Buy</a>
  </div>
</nav>

<section class="hero">
  <h1>Next Level Script Hub</h1>
  <p>Fast • Secure • Undetected</p>
  <button class="btn">Get Started</button>
</section>

<section class="features">
  <div class="card">
    <h3>⚡ Fast</h3>
    <p>Optimized performance for smooth gameplay.</p>
  </div>

  <div class="card">
    <h3>🔒 Secure</h3>
    <p>Protected with advanced anti-detection system.</p>
  </div>

  <div class="card">
    <h3>🔥 Powerful</h3>
    <p>All-in-one features for dominating.</p>
  </div>
</section>

<footer>
  © 2026 Dextezr Hub
</footer>

</body>
</html>
