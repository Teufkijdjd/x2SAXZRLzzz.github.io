<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x2SAXZRLzzz - Scripts</title>

<style>
body {
  background:#0a0a0a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1 {
  margin:40px 0;
  font-size:28px;
}

/* grid */
.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

/* card */
.card {
  width:250px;
  background:#111;
  padding:25px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
  box-shadow:0 0 20px #00ffe1;
}

.card h3 {
  margin-bottom:10px;
  color:#00ffe1;
}

.card p {
  color:#aaa;
  font-size:14px;
}
</style>
</head>

<body>

<h1>Select Script</h1>

<div class="grid">

  <div class="card" onclick="go('blox')">
    <h3>Blox Fruits</h3>
    <p>Auto farm / skills / fast</p>
  </div>

  <div class="card" onclick="go('aimbot')">
    <h3>Aimbot</h3>
    <p>Lock target / smooth aim</p>
  </div>

  <div class="card" onclick="go('boat')">
    <h3>Build A Boat</h3>
    <p>Auto build / farm gold</p>
  </div>

</div>

<script>
function go(type){
  window.location.href = "view.html?script=" + type;
}
</script>

</body>
</html>
