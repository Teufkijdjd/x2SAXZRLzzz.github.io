<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Script</title>

<style>
body {
  background:#0a0a0a;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

h1 {
  margin-top:40px;
}

.box {
  margin:20px;
  padding:20px;
  background:#111;
  border-radius:10px;
  cursor:pointer;
}

.box:hover {
  background:#1a1a1a;
}
</style>
</head>

<body>

<h1>Select Script</h1>

<div class="box" onclick="go('blox')">Blox Fruits</div>
<div class="box" onclick="go('aimbot')">Aimbot</div>
<div class="box" onclick="go('boat')">Build A Boat</div>

<script>
function go(type){
  window.location.href = "view.html?script=" + type;
}
</script>

</body>
</html>
